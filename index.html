<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pocket Ledger</title>
<meta name="theme-color" content="#0B6E4F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#F1F3EF;
  --surface:#FFFFFF;
  --surface-2:#F7F8F4;
  --ink:#152420;
  --ink-soft:#57685E;
  --ink-faint:#93A199;
  --line:#DCE3DA;
  --line-strong:#C4CDC1;
  --brand:#0B6E4F;
  --brand-ink:#08432F;
  --brand-wash:#E4EFE7;
  --gold:#A9791F;
  --gold-wash:#F4ECD8;
  --income:#1E8E5A;
  --income-wash:#E7F5EC;
  --expense:#B3392E;
  --expense-wash:#FBEAE7;
  --focus:#2563EB;
  --radius-sm:6px;
  --radius:12px;
  --radius-lg:18px;
  --shadow-sm:0 1px 2px rgba(21,36,32,.06);
  --shadow:0 4px 16px rgba(21,36,32,.08), 0 1px 3px rgba(21,36,32,.06);
  --shadow-lg:0 12px 40px rgba(21,36,32,.16), 0 2px 8px rgba(21,36,32,.08);
  --font-display:'Fraunces', Georgia, serif;
  --font-body:'Inter', -apple-system, sans-serif;
  --font-mono:'IBM Plex Mono', ui-monospace, monospace;
  --sidebar-w:230px;
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button, input, select, textarea{ font-family:inherit; font-size:inherit; color:inherit; }
button{ cursor:pointer; }
a{ color:inherit; }
::selection{ background:var(--brand); color:#fff; }
:focus-visible{ outline:2px solid var(--focus); outline-offset:2px; border-radius:4px; }
.num{ font-family:var(--font-mono); font-variant-numeric:tabular-nums; letter-spacing:-0.01em; }
.hidden{ display:none !important; }
.visually-hidden{ position:absolute; width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0); }

/* ---------- Storage warning banner ---------- */
#storage-warning{
  background:var(--gold-wash); border-bottom:1px solid #E3CE94; color:#5C4600;
}
.storage-warning-inner{
  max-width:1100px; margin:0 auto; padding:10px 20px;
  display:flex; align-items:center; gap:10px; font-size:13px; font-weight:500;
}
.storage-warning-inner strong{ font-weight:700; }
#storage-warning-dismiss{
  margin-left:auto; background:none; border:none; color:#5C4600; font-size:20px;
  line-height:1; padding:0 4px; opacity:.6;
}
#storage-warning-dismiss:hover{ opacity:1; }

/* ---------- App shell ---------- */
#app{ display:flex; min-height:100vh; }

.sidebar{
  width:var(--sidebar-w);
  flex-shrink:0;
  background:var(--brand-ink);
  color:#EAF3EE;
  display:flex;
  flex-direction:column;
  padding:22px 16px;
  position:sticky;
  top:0;
  height:100vh;
}
.brand{
  display:flex; align-items:center; gap:10px;
  margin-bottom:28px; padding:0 6px;
}
.brand-mark{
  width:34px;height:34px; border-radius:50%;
  background:var(--gold-wash);
  color:var(--brand-ink);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:17px;
  border:2px solid rgba(255,255,255,.25);
  flex-shrink:0;
}
.brand-text{ font-family:var(--font-display); font-weight:600; font-size:18px; letter-spacing:.01em; color:#fff;}
.brand-sub{ font-size:10.5px; color:#9FC2AE; text-transform:uppercase; letter-spacing:.09em; margin-top:1px;}

.nav{ display:flex; flex-direction:column; gap:2px; flex:1; }
.nav-item{
  display:flex; align-items:center; gap:11px;
  padding:10px 12px; border-radius:9px;
  background:transparent; border:none; color:#CFE3D8;
  text-align:left; font-size:13.5px; font-weight:500;
  transition:background .15s ease, color .15s ease;
}
.nav-item svg{ width:17px; height:17px; flex-shrink:0; opacity:.85; }
.nav-item:hover{ background:rgba(255,255,255,.07); color:#fff; }
.nav-item.active{ background:#EAF3EE; color:var(--brand-ink); font-weight:600; }
.nav-item.active svg{ opacity:1; }
.nav-badge{
  margin-left:auto; background:var(--gold); color:#2B1E00;
  font-size:10.5px; font-weight:700; padding:1px 6px; border-radius:20px;
}
.nav-item.active .nav-badge{ background:var(--brand); color:#fff; }

.sidebar-foot{ display:flex; flex-direction:column; gap:8px; margin-top:12px; }
.balance-chip{
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
  border-radius:11px; padding:12px 13px;
}
.balance-chip .lbl{ font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:#9FC2AE; }
.balance-chip .val{ font-family:var(--font-mono); font-size:19px; font-weight:600; color:#fff; margin-top:3px; }
.icon-btn-row{ display:flex; gap:6px; }
.icon-btn{
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);
  color:#CFE3D8; border-radius:8px; padding:7px; display:flex; align-items:center; justify-content:center;
  flex:1;
}
.icon-btn:hover{ background:rgba(255,255,255,.15); color:#fff; }
.icon-btn svg{ width:15px;height:15px; }

/* ---------- Main ---------- */
.main{ flex:1; min-width:0; display:flex; flex-direction:column; }
.topbar{
  padding:20px 30px 0; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap;
}
.page-title{ font-family:var(--font-display); font-size:26px; font-weight:600; letter-spacing:-.01em; }
.page-sub{ color:var(--ink-soft); font-size:13px; margin-top:2px; }
.content{ padding:18px 30px 60px; flex:1; }

.btn{
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 15px; border-radius:9px; border:1px solid var(--line-strong);
  background:var(--surface); font-weight:600; font-size:13px; color:var(--ink);
  box-shadow:var(--shadow-sm);
  transition:transform .1s ease, box-shadow .15s ease, background .15s ease;
}
.btn:hover{ background:var(--surface-2); }
.btn:active{ transform:translateY(1px); }
.btn svg{ width:15px;height:15px; }
.btn-primary{ background:var(--brand); border-color:var(--brand); color:#fff; }
.btn-primary:hover{ background:var(--brand-ink); }
.btn-ghost{ background:transparent; border-color:transparent; box-shadow:none; color:var(--ink-soft); }
.btn-ghost:hover{ background:var(--surface-2); color:var(--ink); }
.btn-danger{ color:var(--expense); border-color:#EFC9C4; background:var(--expense-wash); }
.btn-danger:hover{ background:#F6DAD6; }
.btn-sm{ padding:6px 11px; font-size:12.5px; border-radius:7px; }
.btn:disabled{ opacity:.45; cursor:not-allowed; }

/* ---------- Cards / KPIs ---------- */
.ledger-band{
  background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 27px, var(--line) 28px);
  border-radius:var(--radius-lg);
  padding:1px;
}
.kpi-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
.kpi-card{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px 17px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden;
}
.kpi-card .stripe{ position:absolute; left:0; top:0; bottom:0; width:4px; }
.kpi-card.income .stripe{ background:var(--income); }
.kpi-card.expense .stripe{ background:var(--expense); }
.kpi-card.net .stripe{ background:var(--brand); }
.kpi-card.balance .stripe{ background:var(--gold); }
.kpi-lbl{ font-size:11.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--ink-soft); font-weight:600; }
.kpi-val{ font-family:var(--font-mono); font-size:25px; font-weight:600; margin-top:6px; letter-spacing:-.01em; }
.kpi-val.income{ color:var(--income); }
.kpi-val.expense{ color:var(--expense); }
.kpi-sub{ font-size:11.5px; color:var(--ink-faint); margin-top:3px; }

.seg{ display:inline-flex; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; padding:3px; gap:2px; }
.seg button{ border:none; background:transparent; padding:6px 13px; border-radius:6px; font-size:12.5px; font-weight:600; color:var(--ink-soft); }
.seg button.active{ background:var(--surface); color:var(--brand-ink); box-shadow:var(--shadow-sm); }

.panel{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  padding:18px 20px; box-shadow:var(--shadow-sm);
}
.panel + .panel{ margin-top:16px; }
.panel-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:10px; flex-wrap:wrap; }
.panel-title{ font-family:var(--font-display); font-weight:600; font-size:16.5px; }
.panel-title small{ display:block; font-family:var(--font-body); font-weight:400; font-size:11.5px; color:var(--ink-faint); text-transform:none; margin-top:1px;}

.grid-2{ display:grid; grid-template-columns:1.4fr 1fr; gap:16px; align-items:start; }
.chart-wrap{ position:relative; height:250px; }
.chart-wrap.donut{ height:220px; }

.legend-list{ display:flex; flex-direction:column; gap:8px; margin-top:12px; max-height:210px; overflow:auto; padding-right:4px;}
.legend-row{ display:flex; align-items:center; gap:8px; font-size:12.5px; }
.legend-dot{ width:9px;height:9px;border-radius:50%; flex-shrink:0; }
.legend-name{ flex:1; color:var(--ink); }
.legend-amt{ font-family:var(--font-mono); font-weight:600; }
.legend-pct{ color:var(--ink-faint); width:38px; text-align:right; font-family:var(--font-mono); }

/* ---------- Stamp badges ---------- */
.stamp{
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 10px 3px 8px; border-radius:20px;
  border:1.5px solid currentColor; font-size:11.5px; font-weight:700;
  text-transform:uppercase; letter-spacing:.03em;
  transform:rotate(-1deg);
  white-space:nowrap;
}
.stamp::before{ content:''; width:5px;height:5px;border-radius:50%; background:currentColor; }
.stamp.c-income{ color:var(--income); background:var(--income-wash); }
.stamp.c-expense{ color:var(--expense); background:var(--expense-wash); }
.stamp.c-none{ color:var(--ink-faint); background:var(--surface-2); border-style:dashed; }

/* ---------- Table ---------- */
.table-wrap{ overflow:auto; border:1px solid var(--line); border-radius:var(--radius); background:var(--surface); }
table{ width:100%; border-collapse:collapse; font-size:13px; min-width:720px; }
thead th{
  text-align:left; padding:10px 14px; background:var(--surface-2); color:var(--ink-soft);
  font-size:11px; text-transform:uppercase; letter-spacing:.06em; font-weight:700;
  border-bottom:1px solid var(--line); position:sticky; top:0; cursor:pointer; user-select:none;
  white-space:nowrap;
}
thead th:hover{ color:var(--ink); }
thead th.sorted::after{ content:' ▾'; font-size:9px; }
tbody td{ padding:10px 14px; border-bottom:1px solid var(--line); vertical-align:middle; }
tbody tr:last-child td{ border-bottom:none; }
tbody tr:hover{ background:var(--surface-2); }
td.amt{ text-align:right; font-family:var(--font-mono); font-weight:600; white-space:nowrap; }
td.amt.income{ color:var(--income); }
td.amt.expense{ color:var(--ink); }
td.desc{ max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
td.row-actions{ text-align:right; white-space:nowrap; }
.row-icon-btn{ background:none;border:none; padding:5px; border-radius:6px; color:var(--ink-faint); }
.row-icon-btn:hover{ background:var(--line); color:var(--ink); }
.row-icon-btn svg{ width:14px;height:14px; }
.cat-select-inline{ border:1px solid var(--line); border-radius:20px; padding:3px 8px; font-size:11.5px; background:var(--surface); }
.empty-row td{ text-align:center; padding:40px 20px; color:var(--ink-faint); }

/* ---------- Filters ---------- */
.filters-row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
.field{ display:flex; flex-direction:column; gap:4px; }
.field label{ font-size:11px; font-weight:600; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; }
input[type=text], input[type=date], input[type=number], input[type=file], select, textarea{
  border:1px solid var(--line-strong); background:var(--surface); border-radius:8px;
  padding:8px 11px; font-size:13px; color:var(--ink);
}
input:focus, select:focus, textarea:focus{ border-color:var(--brand); }
.search-input{ min-width:220px; }
textarea{ resize:vertical; min-height:60px; }

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(15,26,22,.45); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
}
.modal{
  background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg);
  width:100%; max-width:460px; max-height:90vh; overflow:auto;
}
.modal.wide{ max-width:900px; }
.modal-head{ display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--line); }
.modal-head h3{ margin:0; font-family:var(--font-display); font-size:18px; font-weight:600; }
.modal-body{ padding:20px 22px; }
.modal-foot{ padding:16px 22px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:8px; }
.form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-grid .span2{ grid-column:1/-1; }

/* ---------- Wizard (import) ---------- */
.steps{ display:flex; align-items:center; gap:6px; margin-bottom:18px; flex-wrap:wrap; }
.step-pill{ display:flex; align-items:center; gap:7px; padding:6px 12px 6px 6px; border-radius:20px; background:var(--surface-2); border:1px solid var(--line); font-size:12px; font-weight:600; color:var(--ink-faint); }
.step-pill .n{ width:20px;height:20px;border-radius:50%; background:var(--line); color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; }
.step-pill.active{ background:var(--brand-wash); border-color:var(--brand); color:var(--brand-ink); }
.step-pill.active .n{ background:var(--brand); }
.step-pill.done{ color:var(--ink-soft); }
.step-pill.done .n{ background:var(--income); }
.step-arrow{ color:var(--ink-faint); font-size:12px; }

.dropzone{
  border:2px dashed var(--line-strong); border-radius:var(--radius); padding:40px 20px;
  text-align:center; background:var(--surface-2); transition:border-color .15s, background .15s;
}
.dropzone.drag{ border-color:var(--brand); background:var(--brand-wash); }
.dropzone svg{ width:34px;height:34px; color:var(--ink-faint); margin-bottom:8px; }
.dropzone p{ margin:4px 0; color:var(--ink-soft); font-size:13px; }
.dropzone .hint{ font-size:11.5px; color:var(--ink-faint); }

.mapping-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; }
.tag-toolbar{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:10px 14px; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; margin-bottom:10px; font-size:12.5px; }
.tag-toolbar .count{ color:var(--ink-soft); }
.dup-flag{ font-size:10.5px; font-weight:700; color:var(--gold); background:var(--gold-wash); padding:2px 7px; border-radius:20px; }

/* ---------- Toast ---------- */
#toast-host{ position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:8px; z-index:200; }
.toast{
  background:var(--brand-ink); color:#fff; padding:11px 16px; border-radius:9px; box-shadow:var(--shadow-lg);
  font-size:13px; font-weight:500; display:flex; align-items:center; gap:8px; max-width:320px;
  animation:toast-in .2s ease;
}
.toast.error{ background:#7A2A22; }
@keyframes toast-in{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }

/* ---------- Categories tab ---------- */
.cat-cols{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.cat-list{ display:flex; flex-direction:column; gap:6px; margin-top:10px; }
.cat-list-row{ display:flex; align-items:center; gap:10px; padding:8px 10px; border:1px solid var(--line); border-radius:8px; }
.cat-list-row .nm{ flex:1; font-weight:600; font-size:13px; }
.rule-row{ display:flex; align-items:center; gap:8px; padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:12.5px; }
.rule-row .kw{ font-family:var(--font-mono); background:var(--surface-2); padding:2px 7px; border-radius:5px; }
.rule-row .arrow{ color:var(--ink-faint); }
.rule-row .rc{ flex:1; }

/* ---------- Biggest movers ---------- */
.movers-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.movers-col-title{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; font-weight:700; margin-bottom:8px; }
.movers-col-title.income{ color:var(--income); }
.movers-col-title.expense{ color:var(--expense); }
.movers-row{ display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--line); font-size:12.5px; }
.movers-row:last-child{ border-bottom:none; }
.movers-rank{ width:18px; height:18px; border-radius:50%; background:var(--surface-2); color:var(--ink-faint); font-size:10.5px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.movers-desc{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.movers-amt{ font-family:var(--font-mono); font-weight:600; flex-shrink:0; font-size:12px; }
@media (max-width:560px){ .movers-grid{ grid-template-columns:1fr; } }

/* ---------- Spending plan ---------- */
.recurring-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; }
@media (max-width:560px){ .recurring-grid{ grid-template-columns:1fr; } }
.recurring-grid .movers-desc{ white-space:normal; line-height:1.4; }
.qc-result{ margin-top:14px; }
.qc-line{ display:flex; justify-content:space-between; padding:5px 0; font-size:12.5px; color:var(--ink-soft); }
.qc-line .num{ font-family:var(--font-mono); font-weight:600; color:var(--ink); }
.qc-line.qc-total{ border-top:1px solid var(--line); margin-top:4px; padding-top:9px; font-weight:700; font-size:13.5px; color:var(--ink); }
.qc-line.qc-total .num{ font-size:15px; }

/* ---------- Empty state ---------- */
.empty-state{ text-align:center; padding:50px 20px; color:var(--ink-soft); }
.empty-state svg{ width:40px;height:40px; color:var(--ink-faint); margin-bottom:10px; }
.empty-state h4{ font-family:var(--font-display); font-size:16px; margin:6px 0 4px; color:var(--ink); }

/* ---------- Mobile ---------- */
@media (max-width: 900px){
  .kpi-row{ grid-template-columns:1fr 1fr; }
  .grid-2{ grid-template-columns:1fr; }
  .cat-cols{ grid-template-columns:1fr; }
}
@media (max-width: 720px){
  #app{ flex-direction:column; }
  .sidebar{ position:sticky; top:0; height:auto; width:100%; flex-direction:row; align-items:center; padding:10px 14px; z-index:50; }
  .brand{ margin-bottom:0; }
  .brand-sub{ display:none; }
  .nav{ flex-direction:row; overflow-x:auto; flex:1; margin-left:10px; }
  .nav-item span.lbl{ display:none; }
  .nav-item{ padding:9px; }
  .sidebar-foot{ display:none; }
  .topbar, .content{ padding-left:16px; padding-right:16px; }
  .kpi-row{ grid-template-columns:1fr 1fr; }
  .form-grid{ grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div id="storage-warning" class="hidden">
  <div class="storage-warning-inner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="flex-shrink:0;"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span id="storage-warning-text"></span>
    <button id="storage-warning-dismiss" title="Dismiss for now">&times;</button>
  </div>
</div>

<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">£</div>
      <div>
        <div class="brand-text">Pocket Ledger</div>
        <div class="brand-sub">Money, tracked</div>
      </div>
    </div>

/* ---------- persistence ---------- */
let DB = null;
let saveTimer = null;
// window.storage is a Claude-only API. When this app is self-hosted (GitHub
// Pages, etc.) and installed as a PWA, that API doesn't exist — so we fall
// back to the browser's own localStorage, which is exactly what makes an
// installed PWA remember your data between visits on your phone.
const IN_CLAUDE = !!(window.storage && window.storage.get && window.storage.set);
const LOCAL_KEY = 'pocketledger_data_v1';
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 450);
}
async function persist(){
  const json = JSON.stringify(DB);
  try{
    if(IN_CLAUDE){
      await window.storage.set(STORAGE_KEY, json, false);
    } else if(window.localStorage){
      window.localStorage.setItem(LOCAL_KEY, json);
    }
  }catch(e){
    console.error('save failed', e);
    toast('Could not save changes — try again in a moment', 'error');
  }
}
async function loadDB(){
  try{
    if(IN_CLAUDE){
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value) return JSON.parse(res.value);
      return null;
    }
    if(window.localStorage){
      const raw = window.localStorage.getItem(LOCAL_KEY);
      if(raw) return JSON.parse(raw);
    }
  }catch(e){ /* key not found, storage unavailable, or corrupt JSON */ }
  return null;
}

/* ---------- formatting ---------- */
function gbp(n, opts){
  opts = opts || {};
  const neg = n < -0.004;
  const abs = Math.abs(n);
  const str = '£' + abs.toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2});
  if(opts.signed && n > 0.004) return '+' + str;
  if(neg) return opts.parens ? '(' + str + ')' : '-' + str;
  return str;
}
function ukDate(iso){
  if(!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if(isNaN(d)) return iso;
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
}
function ukDateShort(iso){
  const d = new Date(iso + 'T00:00:00');
  if(isNaN(d)) return iso;
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
}
function monthLabel(key){
  const [y,m] = key.split('-');
  const d = new Date(parseInt(y), parseInt(m)-1, 1);
  return d.toLocaleDateString('en-GB', {month:'short', year:'2-digit'});
}
function mondayOf(iso){
  const d = new Date(iso + 'T00:00:00');
  const day = (d.getDay() + 6) % 7; // 0 = Monday
  d.setDate(d.getDate() - day);
  return d.toISOString().slice(0,10);
}
function addDays(iso, n){
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function addMonths(iso, n){
  const d = new Date(iso + 'T00:00:00');
  d.setMonth(d.getMonth()+n);
  return d.toISOString().slice(0,10);
}
function monthKey(iso){ return iso.slice(0,7); }
function yearKey(iso){ return iso.slice(0,4); }

}

/* ---------- recurring transaction detection ---------- */
function normalizeDescForRecurring(desc){
  return String(desc||'')
    .toUpperCase()
    .replace(/[0-9]/g,' ')       // strip reference numbers / embedded dates
    .replace(/[^A-Z ]/g,' ')     // strip punctuation
    .replace(/\s+/g,' ')
    .trim()
    .split(' ')
    .filter(Boolean)
    .slice(0,3)                  // first 3 significant words is usually the merchant/payee
    .join(' ');
}
function daysBetween(a,b){
  return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00')) / 86400000);
}
function recurringKey(descKey, amount){ return descKey+'|'+Math.round(amount); }
function detectRecurring(){
  const byDesc = {};
  DB.transactions.forEach(t=>{
    const key = normalizeDescForRecurring(t.description);
    if(!key) return;
    (byDesc[key] = byDesc[key] || []).push(t);
  });
  const results = [];
  Object.entries(byDesc).forEach(([descKey, txs])=>{
    if(txs.length < 2) return;
    // Cluster same-description transactions by similar amount (tolerant of a
    // few pence of rounding, but not genuinely different amounts).
    const sorted = [...txs].sort((a,b)=> a.amount-b.amount);
    const clusters = [];
    sorted.forEach(t=>{
      const c = clusters.find(c=> Math.abs(t.amount - c.avg) <= Math.max(1, Math.abs(c.avg)*0.05));
      if(c){ c.items.push(t); c.avg = c.items.reduce((s,x)=>s+x.amount,0)/c.items.length; }
      else clusters.push({avg:t.amount, items:[t]});
    });
    clusters.forEach(c=>{
      if(c.items.length < 2) return;
      const byDate = [...c.items].sort((a,b)=> a.date.localeCompare(b.date));
      const gaps = [];
      for(let i=1;i<byDate.length;i++) gaps.push(daysBetween(byDate[i-1].date, byDate[i].date));
      const avgGap = gaps.reduce((s,g)=>s+g,0)/gaps.length;
      // "Roughly monthly": every gap between 10–45 days, averaging 24–36 days.
      // Loose enough to survive weekends/bank holidays shifting a date a bit.
      const plausible = gaps.every(g=> g>=10 && g<=45) && avgGap>=24 && avgGap<=36;
      if(!plausible) return;
      const last = byDate[byDate.length-1];
      results.push({
        key: recurringKey(descKey, c.avg),
        description: last.description,
        amount: c.avg,
        category: last.category,
        occurrences: byDate.length,
        avgIntervalDays: Math.round(avgGap),
        lastDate: last.date,
        nextExpected: addDays(last.date, Math.round(avgGap)),
      });
    });
  });
  return results.sort((a,b)=> a.amount - b.amount);
}
function periodRange(period){
  const now = new Date();
  if(period==='month'){
    const base = new Date(now.getFullYear(), now.getMonth() + UI.dashboardMonthOffset, 1);
    const from = base.toISOString().slice(0,10);
    const to = new Date(base.getFullYear(), base.getMonth()+1, 0).toISOString().slice(0,10);
    return {from, to, label: base.toLocaleDateString('en-GB',{month:'long', year:'numeric'})};
  }
  if(period==='year'){
    const y = now.getFullYear() + UI.dashboardYearOffset;
    return {from:`${y}-01-01`, to:`${y}-12-31`, label:String(y)};
  }
  return {from:'0000-01-01', to:'9999-12-31', label:'All time'};
}

/* ---------- utils: escaping ---------- */
function escHTML(s){ return String(s??'').replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
function escAttr(s){ return escHTML(s); }

/* ---------- toast ---------- */
function toast(msg, type){
  const host = document.getElementById('toast-host');
  const el = document.createElement('div');
  el.className = 'toast' + (type==='error' ? ' error' : '');
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .25s'; setTimeout(()=>el.remove(),250); }, 2600);
}

/* ---------- modal ---------- */
function openModal(html, opts){
  opts = opts || {};

  host.innerHTML = `<div class="modal-overlay" id="modal-overlay"><div class="modal ${opts.wide?'wide':''}">${html}</div></div>`;
  document.getElementById('modal-overlay').addEventListener('mousedown', (e)=>{
    if(e.target.id==='modal-overlay') closeModal();
  });
  document.addEventListener('keydown', escCloseOnce);
}
function escCloseOnce(e){ if(e.key==='Escape'){ closeModal(); } }
function closeModal(){
  document.getElementById('modal-host').innerHTML = '';
  document.removeEventListener('keydown', escCloseOnce);
}

function trendBuckets(){
  const now = todayISO();
  const buckets = [];
  if(UI.trendGran==='week'){
    let start = mondayOf(now);
    for(let i=11;i>=0;i--){
      const from = addDays(start, -7*i);
      const to = addDays(from, 6);
      buckets.push({from, to, label: ukDateShort(from)});
    }
  } else if(UI.trendGran==='month'){
    for(let i=11;i>=0;i--){
      const from = addMonths(now.slice(0,8)+'01', -i).slice(0,7)+'-01';
      const d = new Date(from+'T00:00:00');
      const to = new Date(d.getFullYear(), d.getMonth()+1, 0).toISOString().slice(0,10);
      buckets.push({from, to, label: monthLabel(from.slice(0,7))});
    }
  } else {
    const y = parseInt(now.slice(0,4));
    for(let i=5;i>=0;i--){
      const yr = y-i;
      buckets.push({from:`${yr}-01-01`, to:`${yr}-12-31`, label:String(yr)});
    }
  }
  return buckets;
}

function drawTrendChart(){
  const buckets = trendBuckets();
  const incomeData = buckets.map(b=> sumIncome(txInRange(b.from,b.to)));
  const expenseData = buckets.map(b=> sumExpense(txInRange(b.from,b.to)));
  const ctx = document.getElementById('trend-chart');
  if(!ctx) return;
  if(UI.charts.trend) UI.charts.trend.destroy();
  UI.charts.trend = new Chart(ctx, {
    type: UI.trendGran==='week' ? 'bar' : 'line',
    data: {
      labels: buckets.map(b=>b.label),
      datasets: [
        {label:'Income', data:incomeData, borderColor:'#1E8E5A', backgroundColor:UI.trendGran==='week'?'#1E8E5A':'rgba(30,142,90,.12)', tension:.3, fill:UI.trendGran!=='week', borderWidth:2, borderRadius:4, pointRadius:2},
        {label:'Expenses', data:expenseData, borderColor:'#B3392E', backgroundColor:UI.trendGran==='week'?'#B3392E':'rgba(179,57,46,.10)', tension:.3, fill:UI.trendGran!=='week', borderWidth:2, borderRadius:4, pointRadius:2},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index', intersect:false},
      plugins:{ legend:{position:'bottom', labels:{boxWidth:10, usePointStyle:true, font:{family:"'Inter',sans-serif", size:11.5}}},
        tooltip:{callbacks:{label:(ctx)=> ` ${ctx.dataset.label}: ${gbp(ctx.parsed.y)}`}} },
      scales:{ y:{ beginAtZero:true, ticks:{callback:(v)=>'£'+v.toLocaleString('en-GB'), font:{size:11}}, grid:{color:'#E7EBE3'} },
                x:{ grid:{display:false}, ticks:{font:{size:11}} } }
    }
  });
}

const DONUT_COLORS = ['#0B6E4F','#A9791F','#B3392E','#2563EB','#7C3AED','#0D9488','#C2410C','#4B5563','#DB2777','#65A30D'];
function drawDonutChart(list, chartKey, canvasId, legendId, emptyTitle, emptyDesc){
  const byCat = {};
  list.forEach(t=>{ if(t.amount<0){ const k=t.category||'Uncategorised'; byCat[k]=(byCat[k]||0)+Math.abs(t.amount); } });
  let entries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  if(entries.length>8){
    const top = entries.slice(0,7);
    const rest = entries.slice(7).reduce((s,e)=>s+e[1],0);
    entries = [...top, ['Other', rest]];
  }
  const total = entries.reduce((s,e)=>s+e[1],0);
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  if(UI.charts[chartKey]) UI.charts[chartKey].destroy();
  const legendEl = document.getElementById(legendId);
  if(!entries.length){
    ctx.parentElement.innerHTML = `<div class="empty-state" style="padding:30px 10px;"><h4>${emptyTitle}</h4><p style="font-size:12.5px;">${emptyDesc}</p></div>`;
    if(legendEl) legendEl.innerHTML='';
    return;
  }
  UI.charts[chartKey] = new Chart(ctx, {
    type:'doughnut',
    data:{ labels:entries.map(e=>e[0]), datasets:[{ data:entries.map(e=>e[1]), backgroundColor:DONUT_COLORS, borderWidth:2, borderColor:'#fff' }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'62%',
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:(ctx)=> ` ${ctx.label}: ${gbp(ctx.parsed)}`}} } }
  });
  if(legendEl){
    legendEl.innerHTML = entries.map((e,i)=>{
      const pct = total? Math.round(e[1]/total*100) : 0;
      return `<div class="legend-row"><span class="legend-dot" style="background:${DONUT_COLORS[i%DONUT_COLORS.length]}"></span><span class="legend-name">${escHTML(e[0])}</span><span class="legend-amt num">${gbp(e[1])}</span><span class="legend-pct">${pct}%</span></div>`;
    }).join('');
  }
}
function drawCategoryChart(list){
  drawDonutChart(list, 'cat', 'cat-chart', 'cat-legend', 'No spending yet', 'Categorised expenses for this period will appear here.');
}
function drawYTDChart(){
  const y = todayISO().slice(0,4);
  const ytdList = txInRange(`${y}-01-01`, todayISO());
  drawDonutChart(ytdList, 'ytd', 'ytd-chart', 'ytd-legend', 'No spending yet this year', 'Categorised expenses since 1 January will appear here.');
}

function filteredSortedTx(){
  let list = DB.transactions.slice();
  const f = UI.txFilters;
  if(f.search){
    const q = f.search.toLowerCase();
    list = list.filter(t=> t.description.toLowerCase().includes(q) || (t.notes||'').toLowerCase().includes(q));
  }
  if(f.category!=='all'){
    list = list.filter(t=> f.category==='uncategorised' ? !t.category : t.category===f.category);
  }
  if(f.type!=='all'){
    list = list.filter(t=> f.type==='income' ? t.amount>0 : t.amount<0);
  }
  if(f.from) list = list.filter(t=> t.date >= f.from);
  if(f.to) list = list.filter(t=> t.date <= f.to);
  const {col, dir} = UI.txSort;
  list.sort((a,b)=>{
    let av=a[col], bv=b[col];
    if(col==='amount'){ av=Math.abs(a.amount); bv=Math.abs(b.amount); }
    if(typeof av==='string') av=av.toLowerCase();
    if(typeof bv==='string') bv=bv.toLowerCase();
    if(av<bv) return dir==='asc'?-1:1;
    if(av>bv) return dir==='asc'?1:-1;
    return 0;
  });
  return list;
}

function deleteTx(id){

  openModal(`

    <div class="modal-body">
      <p style="margin:0 0 4px;">${escHTML(t.description)}</p>
      <p style="color:var(--ink-soft); font-size:13px; margin:0;">${ukDate(t.date)} · ${gbp(t.amount,{signed:true})}</p>
    </div>
    <div class="modal-foot"><button class="btn" id="m-cancel">Cancel</button><button class="btn btn-danger" id="m-confirm">Delete</button></div>
  `);

  document.getElementById('m-confirm').onclick = ()=>{
    DB.transactions = DB.transactions.filter(x=>x.id!==id);
    scheduleSave(); closeModal(); renderContent(); toast('Transaction deleted');

    <div class="modal-foot"><button class="btn" id="m-cancel">Cancel</button><button class="btn btn-primary" id="m-save">${t?'Save changes':'Add transaction'}</button></div>
  `);
  let currentKind = isIncome ? 'income' : 'expense';
  function fillCategories(){
    const sel = document.getElementById('tx-category');
    const opts = DB.categories.filter(c=>c.kind===currentKind);
    sel.innerHTML = opts.map(c=>`<option value="${escAttr(c.name)}" ${t&&t.category===c.name?'selected':''}>${escHTML(c.name)}</option>`).join('');
  }
  fillCategories();
  document.getElementById('tx-type-seg').addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    currentKind = b.dataset.k;
    document.querySelectorAll('#tx-type-seg button').forEach(x=>x.classList.toggle('active', x===b));
    fillCategories();
  });
  document.getElementById('m-cancel').onclick = closeModal;
  document.getElementById('m-save').onclick = ()=>{
    const date = document.getElementById('tx-date').value;
    const amountRaw = parseFloat(document.getElementById('tx-amount').value);
    const desc = document.getElementById('tx-desc').value.trim();
    const category = document.getElementById('tx-category').value;
    const account = document.getElementById('tx-account').value.trim();
    const notes = document.getElementById('tx-notes').value.trim();
    if(!date || isNaN(amountRaw) || amountRaw<=0 || !desc){
      toast('Please fill in date, description and a positive amount', 'error'); return;
    }
    const amount = currentKind==='income' ? Math.abs(amountRaw) : -Math.abs(amountRaw);
    if(t){
      Object.assign(t, {date, amount, description:desc, category, account, notes});
    } else {
      DB.transactions.push({id:uid('tx'), date, amount, description:desc, category, account, notes, source:'manual'});
    }
    scheduleSave(); closeModal(); renderContent();
    toast(t?'Transaction updated':'Transaction added');
  };
}

function autoCategoriseAll(){
  let count = 0;
  DB.transactions.forEach(t=>{
    if(!t.category){
      const s = suggestCategory(t.description);
      if(s){ t.category = s; count++; }
    }
  });
  if(count){ scheduleSave(); renderContent(); toast(`Auto-categorised ${count} transaction${count===1?'':'s'}`); }
  else toast('No matching rules for your uncategorised transactions');
}

/* =========================================================
   SPENDING PLAN
   ========================================================= */
function planNumbers(){
  const balance = currentBalance();
  const recurringAll = detectRecurring().filter(r=> !DB.dismissedRecurring.includes(r.key));
  const recurringIncome = recurringAll.filter(r=> r.amount>0).sort((a,b)=> a.nextExpected.localeCompare(b.nextExpected));
  const recurringExpense = recurringAll.filter(r=> r.amount<0).sort((a,b)=> a.nextExpected.localeCompare(b.nextExpected));
  const regularMonthlyOutgoings = recurringExpense.reduce((s,r)=> s+Math.abs(r.amount), 0);
  const regularMonthlyIncome = recurringIncome.reduce((s,r)=> s+r.amount, 0);
  const nextIncomeDate = recurringIncome.length ? recurringIncome[0].nextExpected : null;
  const horizon = nextIncomeDate || addDays(todayISO(), 30);
  const stillDueItems = recurringExpense.filter(r=> r.nextExpected <= horizon);
  const stillDueTotal = stillDueItems.reduce((s,r)=> s+Math.abs(r.amount), 0);
  const wishlistTotal = DB.wishlist.reduce((s,w)=> s+w.amount, 0);
  const availableToSpend = balance - stillDueTotal - wishlistTotal;
  return { balance, recurringIncome, recurringExpense, regularMonthlyOutgoings, regularMonthlyIncome,
    nextIncomeDate, horizon, stillDueItems, stillDueTotal, wishlistTotal, availableToSpend };
}

function moveWish(id, dir){
  const i = DB.wishlist.findIndex(w=>w.id===id);
  const j = i+dir;
  if(i<0 || j<0 || j>=DB.wishlist.length) return;
  [DB.wishlist[i], DB.wishlist[j]] = [DB.wishlist[j], DB.wishlist[i]];
  scheduleSave(); renderPlan(document.getElementById('content'));
}

  const w = DB.wishlist.find(x=>x.id===id);

  openModal(`

  `);
  let kind='expense';
  document.getElementById('c-type-seg').addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    kind = b.dataset.k;
    document.querySelectorAll('#c-type-seg button').forEach(x=>x.classList.toggle('active', x===b));
  });
  document.getElementById('m-cancel').onclick = closeModal;
  document.getElementById('m-save').onclick = ()=>{
    const name = document.getElementById('c-name').value.trim();
    if(!name){ toast('Enter a category name', 'error'); return; }
    if(DB.categories.some(c=>c.name.toLowerCase()===name.toLowerCase())){ toast('That category already exists', 'error'); return; }
    DB.categories.push({name, kind});

function openRuleModal(){
  openModal(`
    <div class="modal-head"><h3>Add auto-tagging rule</h3></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field span2"><label>If description contains</label><input type="text" id="r-kw" placeholder="e.g. TESCO"></div>
        <div class="field span2"><label>Assign category</label><select id="r-cat">${categoryOptionsHTML('', {includeUncategorized:false})}</select></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn" id="m-cancel">Cancel</button><button class="btn btn-primary" id="m-save">Add rule</button></div>
  `);
  document.getElementById('m-cancel').onclick = closeModal;
  document.getElementById('m-save').onclick = ()=>{
    const kw = document.getElementById('r-kw').value.trim();
    const cat = document.getElementById('r-cat').value;
    if(!kw){ toast('Enter text to match', 'error'); return; }
    DB.rules.unshift({keyword:kw, category:cat});
    const applied = applyRuleToUncategorised(kw, cat);
    scheduleSave(); closeModal(); renderCategories(document.getElementById('content')); renderSidebarBits();
    toast(applied ? `Rule added — applied to ${applied} existing uncategorised transaction${applied===1?'':'s'}` : 'Rule added');
  };
}
function applyRuleToUncategorised(keyword, category){
  const kw = keyword.toUpperCase();
  let count = 0;
  DB.transactions.forEach(t=>{
    if(!t.category && t.description.toUpperCase().includes(kw)){
      t.category = category;
      count++;
    }
  });
  return count;
}

async function handleFile(file){
  const st = UI.importState;
  st.fileName = file.name;
  try{
    const buf = await file.arrayBuffer();
    const text = decodeSmart(buf);
    const result = Papa.parse(text.trim(), {skipEmptyLines:true});
    let rows = result.data;
    if(!rows.length){ toast('Could not read any rows from that file', 'error'); return; }
    if(st.hasHeader){
      st.headers = rows[0].map(h=>String(h||'').trim());
      st.rows = rows.slice(1);
    } else {
      st.headers = rows[0].map((_,i)=>'Column '+(i+1));
      st.rows = rows;
    }
    // Drop fully-blank trailing rows some banks add at the end of the export.
    st.rows = st.rows.filter(r=> r.some(cell=> String(cell||'').trim() !== ''));
    st.mapping = guessMapping(st.headers);
    st.step = 2;
    renderImport(document.getElementById('content'));
    toast(`Loaded ${st.rows.length} rows from ${file.name}`);
  }catch(err){
    console.error(err);
    toast('Could not read that file', 'error');
  }
}
function decodeSmart(buf){
  // Most exports are UTF-8, but some UK banks (e.g. Santander) export in
  // Windows-1252, where £ is a single byte that UTF-8 mangles into "�".
  // Try UTF-8 first; if it looks corrupted, fall back to Windows-1252.
  const utf8 = new TextDecoder('utf-8').decode(buf);
  if(utf8.indexOf('\ufffd') === -1) return utf8;
  try{ return new TextDecoder('windows-1252').decode(buf); }
  catch(e){ return utf8; }
}
function guessMapping(headers){
  const find = (names)=>{
    for(const n of names){
      const idx = headers.findIndex(h=> h.toLowerCase().replace(/[^a-z]/g,'').includes(n));
      if(idx>-1) return headers[idx];
    }
    return '';
  };
  const date = find(['date']);
  const description = find(['description','details','narrative','memo','reference']);
  const moneyIn = find(['moneyin','creditamount','paidin','credit']);
  const moneyOut = find(['moneyout','debitamount','paidout','debit']);
  const amount = find(['amount','value','transactionamount']);
  const mode = (moneyIn||moneyOut) && !amount ? 'split' : 'single';
  return {date, description, mode, amount: amount||'', moneyIn: moneyIn||'', moneyOut: moneyOut||''};
}

function parseImportRow(r, st){
  const hIdx = (name)=> st.headers.indexOf(name);
  const dIdx = hIdx(st.mapping.date), descIdx = hIdx(st.mapping.description);
  if(dIdx<0 || descIdx<0) return null;
  const date = parseAnyDate(r[dIdx], st.dateFormat);
  const description = String(r[descIdx]||'').trim();
  let amount = 0;
  if(st.mapping.mode==='single'){
    const aIdx = hIdx(st.mapping.amount);
    let v = parseMoney(r[aIdx]);
    if(!st.negativeIsOutgoing) v = -v;
    amount = v;
  } else {
    const inIdx = hIdx(st.mapping.moneyIn), outIdx = hIdx(st.mapping.moneyOut);
    const inV = inIdx>-1 ? parseMoney(r[inIdx]) : 0;
    const outV = outIdx>-1 ? parseMoney(r[outIdx]) : 0;
    amount = inV - Math.abs(outV);
  }
  return {date, description, amount};
}
function parseMoney(v){
  if(v===undefined||v===null||v==='') return 0;
  let s = String(v).trim();
  if(s==='') return 0;
  let neg = false;
  if(/^\(.*\)$/.test(s)){ neg = true; s = s.slice(1,-1); }
  // Strip everything except digits, minus and decimal point — covers £, $,
  // "GBP", stray "�" from encoding issues, thousands separators, etc.
  s = s.replace(/[^0-9.\-]/g, '');
  if(s.indexOf('-') > -1){ neg = true; s = s.replace(/-/g,''); }
  if(s==='') return 0;
  const n = parseFloat(s);
  return isNaN(n) ? 0 : (neg ? -n : n);
}
function parseAnyDate(v, fmt){
  if(!v) return '';
  const s = String(v).trim();
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return `${m[1]}-${pad(m[2])}-${pad(m[3])}`;
  m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if(m){
    let a=parseInt(m[1]), b=parseInt(m[2]), y=m[3];
    if(y.length===2) y = (parseInt(y)>50?'19':'20')+y;
    let day,month;
    if(fmt==='MDY'){ month=a; day=b; } else { day=a; month=b; }
    if(month>12){ const t=month; month=day; day=t; }
    return `${y}-${pad(month)}-${pad(day)}`;
  }
  const d = new Date(s);
  if(!isNaN(d)) return d.toISOString().slice(0,10);
  return '';
}
function pad(n){ return String(n).padStart(2,'0'); }

function buildParsedRows(){
  const st = UI.importState;
  const existingKeys = new Set(DB.transactions.map(t=> t.date+'|'+t.description.trim().toUpperCase()+'|'+t.amount.toFixed(2)));
  st.parsed = st.rows.map((r,i)=>{
    const p = parseImportRow(r, st);
    if(!p) return null;
    const key = p.date+'|'+p.description.trim().toUpperCase()+'|'+p.amount.toFixed(2);
    return {
      rowId: 'imp_'+i,
      date: p.date, description: p.description, amount: p.amount,
      category: suggestCategory(p.description),
      duplicate: existingKeys.has(key),
      include: !existingKeys.has(key),
    };
  }).filter(Boolean);
}

function confirmImport(){
  const st = UI.importState;
  const toImport = st.parsed.filter(p=>p.include && p.date);
  if(!toImport.length){ toast('No rows selected to import', 'error'); return; }
  const newRuleKeywords = new Set(DB.rules.map(r=>r.keyword.toUpperCase()));
  toImport.forEach(p=>{
    DB.transactions.push({
      id: uid('tx'), date:p.date, description:p.description, amount:p.amount,
      category:p.category||'', account:'Imported', notes:'', source:'import'
    });
    if(st.rememberRules && p.category){
      const already = suggestCategory(p.description);
      if(!already){
        const word = (p.description.trim().split(/\s+/)[0]||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
        if(word.length>=3 && !newRuleKeywords.has(word)){
          DB.rules.unshift({keyword:word, category:p.category});
          newRuleKeywords.add(word);
        }
      }
    }
  });
  DB.transactions.sort((a,b)=> a.date.localeCompare(b.date));
  scheduleSave();
  st.step = 4;
  st.importedCount = toImport.length;
  renderImport(document.getElementById('content'));
  renderSidebarBits();
}

function handleRestoreFile(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    let parsed;
    try{ parsed = JSON.parse(e.target.result); }
    catch(err){ toast('That file isn\u2019t valid JSON — is it a Pocket Ledger backup?', 'error'); return; }
    if(!parsed || !Array.isArray(parsed.transactions) || !Array.isArray(parsed.categories)){
      toast('That doesn\u2019t look like a Pocket Ledger backup file', 'error'); return;
    }
    const clean = {
      startingBalance: typeof parsed.startingBalance==='number' ? parsed.startingBalance : 0,
      categories: parsed.categories,
      rules: Array.isArray(parsed.rules) ? parsed.rules : [],
      transactions: parsed.transactions,
      wishlist: Array.isArray(parsed.wishlist) ? parsed.wishlist : [],
      dismissedRecurring: Array.isArray(parsed.dismissedRecurring) ? parsed.dismissedRecurring : [],
    };
    const currentCount = DB.transactions.length;
    openModal(`
      <div class="modal-head"><h3>Restore this backup?</h3></div>
      <div class="modal-body">
        <p style="margin:0 0 8px;color:var(--ink-soft);font-size:13px;">
          This file contains <strong>${clean.transactions.length}</strong> transaction${clean.transactions.length===1?'':'s'} and ${clean.categories.length} categories.
        </p>
        <p style="margin:0;color:var(--ink-soft);font-size:13px;">
          ${currentCount ? `Your current ${currentCount} transaction${currentCount===1?'':'s'} on this device will be <strong>replaced</strong> — export a backup first if you want to keep them.` : 'This device currently has no data, so nothing will be lost.'}
        </p>
      </div>
      <div class="modal-foot"><button class="btn" id="m-cancel3">Cancel</button><button class="btn btn-primary" id="m-confirm3">Restore backup</button></div>
    `);
    document.getElementById('m-cancel3').onclick = closeModal;
    document.getElementById('m-confirm3').onclick = ()=>{
      DB = clean;
      scheduleSave(); closeModal(); renderContent();
      toast(`Restored ${clean.transactions.length} transactions`);
    };
  };
  reader.onerror = ()=> toast('Could not read that file', 'error');
  reader.readAsText(file);
}
function exportBackup(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `pocket-ledger-backup-${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Backup downloaded');
}

/* =========================================================
   INIT
   ========================================================= */
async function init(){
  checkStorageHealth();

  const loaded = await loadDB();
  DB = loaded || buildSeedDB();
  if(!DB.wishlist) DB.wishlist = [];
  if(!DB.dismissedRecurring) DB.dismissedRecurring = [];
  if(!loaded) scheduleSave();

  document.getElementById('nav').addEventListener('click', (e)=>{
    const b = e.target.closest('.nav-item'); if(!b) return;
    setTab(b.dataset.tab);
  });
  document.getElementById('btn-settings').onclick = openSettingsModal;
  document.getElementById('btn-export').onclick = exportBackup;

  setTab('dashboard');

  // Register service worker if this file is being served from a real origin
  // (this silently does nothing inside a sandboxed preview — that's expected).
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* not hosted standalone — fine */ });
  }
}
function checkStorageHealth(){
  if(IN_CLAUDE) return; // Claude's own storage is handled separately and reliably.

  const banner = document.getElementById('storage-warning');
  const textEl = document.getElementById('storage-warning-text');

  if(location.protocol === 'file:'){
    textEl.innerHTML = `<strong>Your data won't save.</strong> You're opening this file directly (file://) — browsers block persistent storage for local files like this, even if you install it as a desktop app from here (the app still points at this same file://, so the problem follows it). Serve it over http(s) instead: run <code style="background:rgba(0,0,0,.06);padding:1px 5px;border-radius:4px;">python3 -m http.server</code> in this folder and open <code style="background:rgba(0,0,0,.06);padding:1px 5px;border-radius:4px;">http://localhost:8000</code>, or host it online (GitHub Pages, Netlify) — then install from that address instead.`;
    banner.classList.remove('hidden');
    return;
  }
  try{
    const testKey = '__pocketledger_storage_test__';
    window.localStorage.setItem(testKey, '1');
    window.localStorage.removeItem(testKey);
  }catch(e){
    textEl.innerHTML = `<strong>Your data won't save.</strong> This browser is blocking local storage for this page (common in private/incognito windows, or with strict tracking-protection settings). Try a normal browser window, or a different browser.`;
    banner.classList.remove('hidden');
    return;
  }
}
const dismissBtn = document.getElementById('storage-warning-dismiss');
if(dismissBtn) dismissBtn.onclick = ()=> document.getElementById('storage-warning').classList.add('hidden');
init();
</script>
